nvg.nouse = Tento předmět nemůžeš použít, když na sobě máš brýle pro noční vidění.
nvg.conflict.hazmat = Aby sis nasadil brýle nočního vidění, budeš si muset nejprve sundet ochranný oblek.
nvg.conflict.scp1499 = Aby sis nasadil brýle nočního vidění, budeš si muset nejprve sundet SCP-1499.
