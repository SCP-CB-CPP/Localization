[Option Tooltip]
; Graphics
vsync = "Vertikální synchronizace" omezuje počet snímků obrazovky na obnovovací frekvenci monitoru. Při nižších frekvencích může způsobit sekání.
antialias = "Vyhlazování" vyhlazuje 3D modely a zbavuje se nerovností.
gamma = "Jas" seřizuje obraz tak, aby nebyl příliš tmavý, ale zároveň ne příliš světlý. Vysoký jas může zhoršit čitelnost.
texlod = "Bias textur LOD" rozhoduje o vzdálenosti, na kterou se začnou textury rozmazávat.
vram = Textury uchovány ve VRAM se sice nahrávají rychleji, mohou však ovlivnit grafickou stránku hry.
hudscalefactor = "Velikost ukazatelů" ovlivňuje velikost kontrolek mrkání a výdrže, inventáře a ukazatelů různých předmětů. Rozpětí hodnot je vázáno k rozlišení obrazovky, aby nemohly ukazatele být příliš malé, či velké.
hudoffset = "Odsazení ukazatelů" určuje posunutí kontrolek mrkání a výdrže, spolu s ukazateli předmětů. Určeno převážně pro ultraširoké monitory.
viewbob = "Simulace pohybů hlavou" určuje množství pohybů kamery při pohybu.
fov = "Zorné pole" určuje, jak velkou část prostoru lze ve hře vidět.

; Audio
musicvol = Určuje hlasitost hudby. Úplné posunutí vlevo ji vypne.
soundvol = Určuje hlasitost zvuků. Úplné posunutí vlevo je vypne.
localaudio = Určuje, zda hra používá dabing původní, či dabing poskytován překladem.
subtitles = Přepis zrovna znějícího dialogu na dolní části obrazovky.
closedcaptions = Přepis zrovna znějících zvukových efektů na dolní části obrazovky.
sfxautorelease = "Sound auto-release" vypustí zvuk z paměti, nebyl-li posledních 5 vteřin přehrán. Pomáhá při potížích s pamětí.
usertrack = Umožní kanálu 1 na rádiostanici přehrávat zvukové soubory ze složky "SFX\Radio\UserTracks\". Stisknutím klávesy 1 při používání rádia přeskočí na další skladbu.
usertrackmode = Určuje režim přehrávání vlastní hudby. Režim "Abecední" přehraje všechny skladby v abecedním pořadí, režim "Náhodný" náhodně.
usertrackmode.note = Pozor - Náhodný režim nekontroluje již přehrané skladby - může zaznít stejná dvakrát po sobě.
usertrackscan = Provede znovu kontrolu složky s vlastní hudbou pro přidání / smazání skladeb.

; Controls
mousesensitivty = Určuje rychlost myši.
mousesmoothing = Může pomoct v případě sekání či zvláštních pohybů myši.
binds = Změnit funkci kláves.

; Advanced
showhud = Zobrazovat kontrolky mrkání a výrdže.
console = Povolí vývojářskou konzoli. Ve hře lze spustit stisknutím klávesy {0}.
console.note = Používání konzole zamezuje získání achievementů na Steamu!
speedrunmode = Zobrazí časovač na míru udělaný pro speedrunnery.
numericseeds = Umožňuje použití celých čísel, která jsou vsazena přímo do interního generátoru náhodných čísel, jakožto seed. Není-li hráčem poskytnut seed, je použita doba od zapnutí počítače v setinách vteřin.
achpopup = Ukazatel oznámí hráči vždy, kdy získá achievement.
launcher = Umožňuje znovu povolit spouštěč, byl-li dříve vypnut.
showfps = Ukazuje snímky za vteřinu v levém horním rohu obrazovky.
framelimit = Omezuje počet snímků za vteřinu.
framelimit.note = Většinou je vhodnou hodnotou 60. Seká-li se hra, snížení by mohlo snímky ustálit.

