[Death Message]
008 = V sektoru [REDIGOVANO] jsme narazili na Subjekta D-9341, požívajícího doktora [REDIGOVANO] zaživa. Subjekt byl ihned zastřelen příslušníkem útvaru Devítiocasá liška a poslán na pitvu. Po potvrzení nákazy SCP-008 bylo tělo spáleno.
008.gate = Subjekt D-9341 byl nalezen poblíž {0}. Byl ihned zlikvidován příslušníkem útvaru Devítiocasá liška a poslán na pitvu. Po potvrzení nákazy SCP-008 bylo tělo spáleno.
008.gate.a = Brány A
008.gate.b = Brány B
008zombie = Subjekt D-9341. Příčina úmrtí: následky několika zranění způsobených [REDIGOVÁNO], který byl nakažen SCP-008. Onen subjekt byl dopátrán Devítiocasou liškou a zlikvidován.
012 = Subjekt D-9341 byl nalezen v louži krve vedle SCP-012. Zdá se, že si před vykrvácením odlomil zápěstí a napsal vlastní krví do partitury tři nové řádky.
035.chamber = V kontaminační místnosti SCP-035 jsme nalezli mrtvé tělo subjekta třídy D čísla D-9341. Na subjektu bylo zjištěno několik otřesů krevních cév okolo očí. Tělo bylo odvezeno na pitvu.
035.tentacle = "Na tohle budeme potřebovat víc, než jen obyčejnou úklidovou četu. Zdá se, že z těla uvnitř mistnosti vyrašily dvě chapadlovité končetiny. Jsou agresivnější, než cokoliv podobného zaznamenáno předtím - také se zdá, že ubily v průbehu zlomu jakéhosi nešťastníka ze třídy D."
035.tentacle.office = "Z těla mrtvého vědce poblíž [REDIGOVÁNO] vyrašil jakýsi chapadlovitý tvor. Je agresivnější, než cokoliv podobného zaznamenáno předtím - také se zdá, že ubil v průbehu zlomu jakéhosi nešťastníka ze třídy D."
049 = Živý exemplář SCP-049-2 nalezen v [REDIGOVÁNO]. Zlikvidován příslušníkem útvaru Devítiocasá liška.
049.chamber = Tři (3) živé exempláře SCP-049-2 nalezeny v tunelu vedoucím ke kontaminační místnosti SCP-049. Zlikvidovány příslušníky Devítiocasé lišky.
0492 = "Subjekt D-9341. Příčina smrti: několik zlomenin a ran způsobených exemplářem SCP-049-2."
096 = V [REDIGOVÁNO] byla nalezena obří kaluž krve. DNA testy prokázaly, že patřila Subjektu D-9341. Pravděpodobně [REDIGOVÁNO] SCP-096.
106.pd = Subjekt D-9341. Tělo částečně rozloženo hmotou, pravděpodobně pocházející z "hniloby" SCP-106. Tělo bylo spáleno.
106.pd.crushed = Nejenže tato mrtvola obsahovala typické znaky oběti SCP-106, našly se na ní také zlomeniny lebky, tři zlomená žebra, zlomený loket a několik dalších.
106.pd.fall = Nejenže tato mrtvola obsahovala typické znaky oběti SCP-106, našly se na ní také dvě vážné zlomeniny obou nohou.
173 = Subjekt D-9341. Příčina smrti: Zlomený vaz. Předpokládán útok SCP-173.
173.camera = Subjekt D-9341. Příčina smrti: Zlomený vaz. Kamerový záznam potvrzdil útok SCP-173.
173.intro = Subjekt D-9341. Příčina smrti: Zlomený vaz. Podle vedoucího bezpečnosti Franklina, který byl na místě činu při zlomu přítomen, byl subjekt zabit SCP-173, hned co začaly potíže s osvětlením areálu.
173.doors = "Pokud se nemýlím, tak tahle místnost tady má být, aby zpomalila SCP-173 v případě zlomu. Takže čí byl ten geniální nápad tam dát ZATRACENOU VENTILAČNÍ ŠACHTU, do které by se vešel dospělý chlap?!"
205 = Zdá se, že po anomáliích vypozorovaných v době [REDIGOVÁNO], se koloběh SCP-205 vrátil k normálu. Uvnitř kontaminační místnosti bylo nalezeno tělo subjekta třídy D. Subjekt má několik modřin, typických pro pracovníky, kteří vstoupili do místnosti, když zrovna byla vyplá světla.
420js = Subjekt D-9341 byl nalezen v kómatu poblíž [REDIGOVÁNO]. Držel v ruce cigaretu a usmíval se. Přestože chemická analýza není definitivní, nalezli jsme v ní vysokou koncentraci neznámeé latky, jejíž molekulární struktura se velice podobá THC.
427 = "Vyžadujeme posily od MOÚ Nu-7. Na tohle budeme potřebovat větší palbu."
895 = "Jisté je to, že zemřel na infarkt. Hádal bych, že ho způsobilo SCP-895, avšak doposud nebylo zaznamenáno, že by dokázalo ovlivňovat videotechniku od něj až takto vzdálenou. Pro zjištění, zda se "rudá zóna" SCP-895 zvětšuje, bude potřeba důkladnější výzkum."
895.nvg = "Subjekt třídy D pozoroval SCP-895 skrz digitální brýle pro noční vidění a zemřel."
895.finenvg = "Bylo zaznamenáno, že subjekt pozoroval SCP-895 zvláštními brýlemi pro noční vidění, pravděpodobně rafinovanými v SCP-914. Je možné, že mu mohly tyto brýle umožnit částečně odporovat memetickým účnikům SCP-895. Brýle byly odvezeny na výzkumné oddělení."
914.rough = "Ve výstupní komoře SCP-914 byla nalezena nesmírně zmrzačená mrtvola. DNA testy prokázaly, že se jednalo o tělo Subjekta D-9341. Je jednoznačné, že subjekt byl "rafinován" na "Drsném" režimu. To, kde sehnal klíč a jak se dostal dovnitž vstupní komory, však zůstává záhadou."
914.superman = Subjekt třídy D nalezen poblíž [REDIGOVÁNO]. Při důkladnější prohlídce bylo v jeho kombinéze nalezeno 12 kilogramů modré, popelovité látky. Chemická analýza je stále dosti rozporuplná. Pravděpodobnou příčinou je SCP-914.
939 = "Všechny (4) rozuteklé objekty SCP-939 byly úspěšně odchyceny a kontaminovány. Tři (3) z nich udělaly ve skladě č.6 celkem neplechu. Poslali jsme tam úklidovou četu."
1025.cardiacarrest = "Zemřel důsledkem infarktu po čtení v SCP-1025, to je jasné. Existuje však psychosomatický infarkt, anebo má SCP-1025 jakési anomální vlastnosti, o kterých ještě nevíme?"
1123 = Subjekt D-9341 byl zastřelen poté, co napadl člena útvaru Devítiocasá liška. Kamerový záznam nám dosvědčil, že se asi devět minut před tím procházel po areálu a pokřikoval větu "zbavit se čtyr škůdců" v čínštine. Poblíž, tedy u [REDIGOVÁNO] bylo nalezeno SCP-1123 - možná příčina. Způsob, kterým bylo SCP-1123 přesunuto ze své kontaminační místnosti je nám stále neznámý.
1048a = Poblíž [REDIGOVÁNO] bylo nalezeno mrtvé tělo, zcela pokryto ušima. Pravděpodobně byl napaden objektem SCP-1048-A a na uších se udusil. Tělo bylo posláno na pitvu.
1162 = V kontaminační místnosti SCP-1162 byla nalezena mrtvola subjekta třídy D. Pitva odhalila, že mu chyběla pravá plíce. Nastáva zde pravděpodobnost, že bylo příčinou smrti SCP-1162.
1499 = Přestože je nám lokace SCP-1499 dosud neznáma, poslali jsme průzkumný tým do ruského města [REDIGOVANO] zkoumat ohlášený útok na kostel.
14991 = Příslušník útvaru Devítiocasá liška objevil poblíž [REDIGOVÁNO] mrtvolu subjektu třídy D a poblíž neznámého muže. Muž byl velice rozrušen a hovořil pouze rusky. Byl odveden do záchytného zařízení [REDIGOVÁNO] a vyčkává příchod tlumočníka.
14991.dimension = Všem pracovníkům poblíž a uvnitř evakuačního střediska LC-2 byla v průběhu zlomu podána amnestika kvůli incidentu 1499-E. Subjekt třídy D zodpovědný za incident byl krátce poté zastřelen agentem [REDIGOVÁNO].
guard.intro = Subjekt D-9341. Příčina smrti: trefa do hlavy samopalem. Kamerové zaznamy potvrzují, že byl zastřelen agentem Uhlířem krátce po uzamčeni areálu.
guard.gate.b = "Agent G. hlásí vedení; zastřelen zběhlý subjekt třídy D poblíž Brány B."
apache = "CH-2 hlásí vedení; zastřelen zběhlý subjekt třídy D poblíž {0}."
apache.gate.a = Brány A
apache.gate.b = Brány B
ntf = Subjekt D-9341. Zastřelen příslušníkem útvaru Devítiocasá liška.
ntf.bloodloss = Subjekt D-9341. Vykrvácel po zásahu příslušníkem útvaru Devítiocasá liška.
tesla = Subjekt D-9341 byl zabit elektrobránou poblíž [REDIGOVÁNO].
killbat = Subjekt D-9341 byl nalezen ve výstupní komoře SCP-914 vedle na první pohled běžné devítivoltové baterie. Bylo na něm nalezeno několik popálenin, pravděpodobně způsobených touto baterií, kterou jsme odvezli na podrobnější výzkum.
suicide_1 = [REDIGOVÁNO]
suicide_2 = Subjekt D-9341 nalezen mrtev v Sektoru [REDIGOVÁNO]. Subjekt neprotrpěl žádné zřejmé úrazy a není jasné, jak zemřel. Tělo posláno na pitvu.
suicide_3 = EXCP_ACCESS_VIOLATION
suicide_4 = Subjekt D-9341 nalezen mrtev v Sektoru [REDIGOVÁNO]. Subjekt vedle sebe napsal svou vlastní krví písmena "kys". Krom toho žádné znaky úrazu, boje či podobně. Tělo posláno na pitvu.
gassed = Subjekt D-9341 nalezen mrtev v [REDIGOVÁNO]. Příčina úmrtí: udušení způsobeno dekontaminačním plynem.

