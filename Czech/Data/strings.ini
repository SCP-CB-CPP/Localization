firstaid.use.full = Zrovna nepotřebuješ lékárničku.
firstaid.use.1 = Vzal sis prášek proti bolesti, ale pořád tě bolí chodit.
firstaid.use.2 = Vzal sis prášek proti bolesti. Cítíš se trochu lépe.
firstaid.use.3 = Povedlo se ti zastavit krvácení.
firstaid.use.4 = Obvázal sis rány, avšak krvácení se ti nepovedlo zcela zastavit.
firstaid.use.5 = Rány jsou příliš vážné na to, abys obvázáním zastavil krvácení.
finefirstaid.use.1 = Obvázal sis rány a vzal prášek proti bolesti. Cítíš se dobře.
finefirstaid.use.2 = Obvázal sis rány a vzal prášek, avšak krvácení se ti nepovedlo zcela zastavit.
finefirstaid.use.3 = Obvázal sis rány a vzal prášek proti bolesti, avšak bolest přetvrává.
bluefirstaid.use.superman = Adrenalin těpřekonalTYVOLEJÚÚHÚÚÚÚ~!
bluefirstaid.use.invert = Náhle je těžké točit hlavou.
bluefirstaid.use.nausea = Je ti nevolno.
bluefirstaid.use.heal = Obvázal sis rány. Krvácení zcela ustálo a cítíš se dobře.
bluefirstaid.use.hurt = Obvázal sis rány a krev začala hutně proudid skrz obvazy.
veryfinefirstaid.use.fullheal = Rány se ti kvapile hojí.
veryfinefirstaid.use.hurt = Začal jsi silně krvácet.
veryfinefirstaid.use.heal = Cítíš se o dost lépe.
veryfinefirstaid.use.nausea = Je ti nevolno.
veryfinefirstaid.use.pocketdimension = Z jakéhosi nevysvětlitelného důvodu ses ocitl v kapesní dimenzi.
eyedrops.tear = Z kapek ti slzí oči.
syringe.use = Píchl sis injekční stříkačku do žíly a ihned pocítil náběh adrenalinu.
finesyringe.use = Píchl sis injekční stříkačku do žíly a ihned pocítil náběh adrenalinu.
veryfinesyringe.use.huge = Píchl sis injekční stříkačku do žíly a ihned pocítil silný náběh adrenalinu.
veryfinesyringe.use.veryhuge = Píchl sis injekční stříkačku do žíly a ihned pocítil obrovský náběh adrenalinu.
veryfinesyringe.use.stomacheache = Píchl sis injekční stříkačku do žíly a začalo tě bolet břicho.
bdc.use = Máš radost z toho, že můžeš oslavit tento významný den.
bdc.use.flipped = Cítíš se skvěle, když víš, že můžeš oslavit tento významný den.
bdc.use.stale = Chutná prošle. Možná sis měl sundat ten prsten...
bdc.use.stale.date = Chutná prošle. Beztak tady už leží nějakou tu dobu...
pill.use = Spolkl jsi piluli.
pill.use.healnausea = Spolkl jsi piluli. Nevolnost tě zrázu opouští.
cigarette.use.unable = Nemáš oheň.
cigarette.use_1 = "Nemám, čím bych ji zapálil. Co kdybych ale... víš co, radši nic."
cigarette.use_2 = "S tím jsem sekl už dávno."
cigarette.use_3 = "I kdybych si chtěl zapálit, nemám čím."
cigarette.use_4 = "Rád bych si práskl... Kéž bych měl zapalovač."
cigarette.use_5 = "S kouřením nemám chuť začít, ani s tím vším, co se tu děje."
420j.use.714 = "CO JE TOHLE ZA SRAČKU, VŽDYŤ TO ANI NEJDE VOLE"
420j.use = "TYYYVOLE TO JE ALE POŘÁDNÝ MATROŠ"
420j.use.nap = "KDE TO... CO? KDO?... MĚL BYCH SI ZDŘÍMNOUT..."
427.on = Otevřel jsi medailon.
427.off = Zavřel jsi medailon.
1162.use.badge = "Cože? Vždyť ten vypadá úplně, jako já!"
1162.use.key = "Není tohle klíč k té staré stodole? Té, ve které jsem... Ne, to snad není možné."
1162.use.hearing = "Proč je mi tohle tak povědomé?"
1162.use.ticket = "Vždyť na tomhle jsem byl!"

