[SFX\Room\Intro\Guard\Ulgrin\ExitCell.ogg]
1.37=<voice=ulgrin>Hej, mají pro tebe práci. Udělej mi laskavost a vystup ven z té cely.

[SFX\Room\Intro\Guard\Ulgrin\ExitCellRefuse1.ogg]
0=<voice=ulgrin,length=6>Ts, seš blbej, nebo co? Řekl jsem, ať vylezeš! Jestli hned teď nevylezeš, tak ti nakopu prdel.

[SFX\Room\Intro\Guard\Ulgrin\ExitCellRefuse2.ogg]
0=<voice=ulgrin,length=5.5>Koukej kamaráde, čas nám běží a já už to chci mít rychle za sebou. Jestli nebudeš spolupracovat, tak tě tady na místě zkopu.

[SFX\Room\Intro\Guard\Ulgrin\CellGas1.ogg]
0=<voice=ulgrin,caption=true>*smích*
0.6=<voice=ulgrin,length=6.5>Tak ty seš asi zatím nejblbější subjekt, kterýho tahle díra zažila. Tak dobře! Zavřete dveře a pusťte plyn.

[SFX\Room\Intro\Guard\Ulgrin\CellGas2.ogg]
0=<voice=ulgrin,length=5.7>Haha. Celkem mě mrzí, žes aspoň trošku nezabojoval. Víš, jakou jsem měl chuť ti jednu vrazit?

[SFX\Room\Intro\Guard\Ulgrin\Escort1.ogg]
0=<voice=ulgrin,length=7.5>No tak pojď za mnou. A jen abys věděl, tak... máme povolení zabíjet, takže být tebou bych nic nevymýšlel.

[SFX\Room\Intro\Guard\Ulgrin\Escort2.ogg]
0=<voice=ulgrin,length=10>Prostě pojď za mnou. Jo a mimochodem, máme povolení zlikvidovat jakékoliv neposlušné subjekty, takže být tebou bych nezkoušel žádné prkotiny.

[SFX\Room\Intro\Guard\Ulgrin\EscortRun.ogg]
0=<voice=ulgrin,length=4.3>Hej, debile, jdeš blbě! Vrať se!

[SFX\Room\Intro\Guard\Ulgrin\EscortRefuse1.ogg]
0=<voice=ulgrin>Pohni kostrou, čekají na tebe!

[SFX\Room\Intro\Guard\Ulgrin\EscortRefuse2.ogg]
0=<voice=ulgrin>Hele, už tak mi ta práce leze krkem, tak mi ji zbytečně nekaž.

[SFX\Room\Intro\Guard\Ulgrin\EscortPissedOff1.ogg]
0=<voice=ulgrin,length=5.5>Tak na tohle fakt nemám náladu. A taky nemám problém ti prostřelit lebku, pokud nebudeš spolupracovat.

[SFX\Room\Intro\Guard\Ulgrin\EscortPissedOff2.ogg]
