[Mobilní Ozbrojené Útvary]
image path = mtf.jpg
align x = center
align y = center
text1 = MOÚ jsou malé týmy (většinou čítající kolem 20 členů, i když jsou známy i některé přesahující 50) specializujicí se na určité úkoly během mimořádného stavu.
text2 = Mobilní Ozbrojený Útvar Epsilon 11 ("Devítiocasá liška") je zvlášťně vycvičený útvar zaměřen na ochranu a kontaminaci SCP objektů nacházejícich se v Areálu [REDIGOVÁNO].
text3 = Při zlomu kontaminace jsou jejimi úkoly kontaminace všech živých, nebezpečných objektů SCP, záchrana zbylého personálu Nadace a zneškodnění přeživších z řad personálu třídy D.

[Brýle pro noční vidění]
image path = NVG.jpg
align x = right
align y = top
disablebackground = true
text1 = Mobilní Ozbrojené Útvary v případě výpadku proudu či zlomu kontaminace fasují základní brýle pro noční vidění.
text2 = Jsou poskytovány i zbytku personálu, ovšem ten je zaškolen se při mimořádném stavu soustředit na evakuaci.

[SCP-012]
image path = 012.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-012 bylo nalezeno archeologem K.M. Sandovalem při vykopávce hrobky v severní Itálii. Objekt je nedokončený notový zápis skladby "Na Lebkové hoře".
text2 = Červenočerná tekutina, kterou jsou noty zapsány je smíšená krev několika osob. Původne bylo teorizováno, že se jedná o jakousi borůvkovou šťávu či jiné přírodní barvivo.
text3 = V každém případě, kdy bylo testovacím subjektům nařízeno s tímto objektem pracovat, se všichni z nich rozřezali proto, aby se mohli pokusit vlastní krví dokončit zápis, vždy končící s intenzivními traumaty a příznaky psychózy.

[SCP-035]
image path = 035.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-035 je porcelánová divadelní maska s obličejem komedie, ovšem několikrát bylo již zaznamenáno, jak se změnil v tragédii.
text2 = Při položení SCP-035 na hlavu hostitele je mozek hostitele přepsán alternativní mozkovou vlnou - tento proces končí mozkovou smrtí hostitele. Poté převezme SCP-035 hostitelovo vědomí, nahrazujíce ho svým.
text3 = Psychoanalýzou bylo zjištěno, že vědomí uvnitř SCP-035 má velice manipulativní sklony a je schopno vážně ovlivňovat osoby, se kterými komunikuje. Také vykazuje znaky sadismu, dokonce schopna slovně dohnat své oběti k sebevraždě.

[SCP-049]
image path = 049.jpg
align x = left
align y = center
disablebackground = true
text1 = Přestože je SCP-049 zdánlivě humanoidního vzhledu, Nadace doposud neměla možnost podrobněji studovat jeho telo, neboť je pokryto oděvem morového doktora, možná pocházejicím z 15-16. století odněkud z Evropy.
text2 = Dotek SCP-049 je pro člověka extrémně smrtící. Po doteku oběť (nyní uvedena pouze jako SCP-049-2) projde [REDIGOVÁNO] a brzy zemře.
text3 = SCP-049 poté vytáhne z lékařské tašky tvořené z [REDIGOVÁNO] skalpely, jehly, vlákna a několik ampulek doposud neidentifikovaneé tekutiny, začne pitvat SCP-049-02 a poté mu do těla vloží několik chemikálií.
text4 = Po přibližně 20 minutách se SCP-049 povede sešít SCP-049-2 zpět dohromady. Po několika dalších začne opět jevit SCP-049-2 znaky života.

[SCP-066]
image path = 066.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-066 je amorfní smšs pečlivě pletené látky vážící asi jeden kilogram.
text2 = Po incidentu 066-2 začal objekt vykazovat vlastnosti zcela odlišné jeho předešlému chování.
text3 = SCP-066 je nyní překvapivě mobilní a tvoří vizuální i sluchové anomálie při styku s jakýmikoliv lidskými subjekty nehledě na to, zda si jej všímají nazpět.

[SCP-079]
image path = 079.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-079 je mikropočítač typu Sorcerer firmy Exidy z roku 1978.
text2 = Není známo kdy a jak získalo SPC-079 vědomí. Pouze víme to, že se za dobu své existence vyvinulo tak, že by jej ani ve světu fantazie jeho hardware neměl být schopen zvládnout.
text3 = Je celkem komunikativní a prošlo Turingovým testem, přestože je velice protivné a drzé. Má také žíravou touhu po útěku.

[SCP-096]
image path = 096.png
align x = right
align y = bottom
disablebackground = true
text1 = SCP-096 je obvykle velice ostýchavé. Podle senzoru pohybu tráví většinu času schouleno u východní stěny.
text2 = Pokud ovšem kdokoli spaří jeho tvář, ať už osobně, na videozáznamu či fotografii, začne vykazovat stav hlubokého emočního znepokojení.
text3 = Asi dvě minuty poté začne běžet k osobě, která jeho tvář spatřila. 

[SCP-106]
image path = 106.jpg
align x = right
align y = bottom
text1 = SCP-106 vzhledově připomíná osobu pokročilého veku s ohromným množstvím rozložené hmoty. Celková "zhnilost" jeho vzhledu byla zaznamenána ve všech případech, kde byl jeho vzhled zapsán, i přes ostatní rozdíly.
text2 = SCP-106 způsobuje "korozi" veškeré hmoty, které se dotkne. Znaky této "koroze" jsou rez, hnití, praskání a vznik slizovité hmoty podobající se té, která pokrývá jeho tělo.
text3 = SCP-106 má schopnost procházet skrz pevný materiál a svou kořist pravděpodobně zabíjí tím, že ji přenese do své kapesní dimenze.

[SCP-173]
image path = 173.jpg
align x = left
align y = bottom
text1 = SCP-173 je socha z betonu a armatury nabarvena barvou značky Krylon. Je živá a extrémně nebezpečná.
text2 = Objekt se nemůže hýbat, je-li přímo sledován - z SCP-173 nesmí být nikdy puštěn zrak. Pracující působící v jeho kontaminační místnosti mají ve zvyku se navzájem varovat před mrkánim.

[SCP-205]
image path = 205.jpg
align x = right
align y = bottom
disablebackground = true
text1 = SCP-205 je dvojice fotografických lamp. Světlo z těchto lamp se chová jinak, než jakékoliv jiné a pronika jakýmkoli povrchem jiné, než bílé barvy.
text2 = Pokud lampy svítí dost dlouho, začnou zobrazovat stín zatím neidentifikované mladé ženy - tento jev je k vidění například v místnosti 52.

[SCP-294]
image path = 294.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-294 je na první pohled obyčejný výdejní automat, lišící se od jiných automatů pouze anglickojazyčnou klávesnicí typu QWERTY.
text2 = Po zadání anglického názvu jakékoliv tekutiny je tato tekutina automatem nalita do standardního třídecového papírového kelímku.
text3 = Při každém z devadesáti sedmi testů (kde bylo zadáno např. voda, kafe, pivo, a soda, nepoživatelné tekutiny jako kyselina sírová, voda do ostřikovačů a motorový olej, spolu s některými látkami, které nejsou většinou v kapalném skupenství, třeba dusík, železo či sklo) bylo SCP-294 v dodání přesné tekutiny úspěšné.

[SCP-372]
image path = 372.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-372 je tvor neznámého taxonu, asi 2 metry dlouhý od hlavy k ocasu, vážící asi 50 kilogramů. Má dlouhé, štíhlé tělo s osmi páry úzkých končetin.
text2 = SCP-372 se naučilo předpovídat pohyby všech bytostí ve své blízkosti. Tuto dovednost používá, aby se mohlo vyhnout, schovat a projít kolem těchto bytostí nespatřeno.
text3 = V případě zlomu kontaminace jsou pracovníci povinni hlásit jakékoliv podezřelé a rychlé pohyby, které zahlédnou v rohu svého zorného pole.

[SCP-427]
image path = 427.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-427 je malý, stříbrný, leštěný medailon s několika vrytými vzory. Tyto vzory zjevně ničemu neslouží.
text2 = SCP-427 bylo vytvořeno vložením pilulky SCP-500 do SCP-914 při použití velice ryzího nastavení. Je-li medailon zavřen, neprokazuje žádnou neobvyklou aktivitu. Po otevření a vystavení biologické hmotě začne neobvyklou rychlostí opravovat veškeré poškozené buňky. Má také schopnost zneškodnit jakoukoliv infekci či podobnou látku vstupující do organismu.
text3 = Dlouhodobé používání SCP-427 je ovšem zdraví nebezpečné. Při hojené hmoty také intenzivně posiluje nervovou soustavu. Personál třídy D vystaven objektu déle, než hodinu se začal měnit v nepopsatelnou masu organické hmoty.
text4 = Takto vznikající tvorové se prokázali jakožto nebezpeční a velice agresivní. Jsou také velice odolni vůči většině nám známým zbraním.

[SCP-500]
image path = 500.jpg
align x = right
align y = bottom
text1 = SCP-500 je malá, plastová nádoba obsahující v době zápisu čtyřicet sedm (47) červených pilulek.
text2 = Po spolknutí pilulky je subjekt vyléčen ze všech nemocí pruměrně za dobu dvou hodin, i když se čas můze lišit podle vážnosti stavu subjektu.
text3 = I přeš intenzivní analýzu a testy nebyly pokusy připravit více vzorků úspěšné.

[SCP-513]
image path = 513.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-513 je obyčejně vypadající, zrezlý zvonek. Kvůli velké míře koroze na jeho povrchu nejdou vidět žádné symboly či nápisy, které na něm mohly dříve být.
text2 = Přibližně hodinu po vystavení zvuku jím tvořeným začne subjekt vnímat bytost zvanou SCP-513-1.
text3 = Všechny doposud dokumentované střety tvrdí, že se jedná o vysokého a vyhublého humanoidního tvora s neobvykle velkýma rukama.

[SCP-682]
image path = 682.jpg
align x = right
align y = bottom
text1 = SCP-682 je obří, zdánlivě ještěrovitý živočich neznámého původu. Při několika rozhovorech v uzavřeném prostředí bylo zjištěno, že v sobě chová nenávist vůči všemu živému.
text2 = Vždy bylo zaznamenáno, že má extrémně vyvinutou sílu, rychlost a reflexy, i když se přesné údaje liší dle jeho stavu. Jeho regenerační schopnosti a odolnost jsou velice pozoruhodné, až znepokojivé. Bylo zaznamenáno chodící a komunikujici, přestože bylo jeho tělo z 87% poničeno.
text3 = SCP-682 musí být co nejdříve zničeno.

[SCP-714]
image path = 714.jpg
align x = center
align y = center
disablebackground = true
text1 = Přestože vypadá, jako obyčejný nefritový prsten, bylo zaznamenáno, že se poloměr SCP-714 přizpůsobuje prstu nositele.
text2 = Jeho nošení má několik výrazných následků, např. vyčerpání, nespavost, zpomalená reakční doba a celkové psychické opoždění.
text3 = Nositelé ovšem v tomto stavu prokazují zvýšenou toleranci vůči nebezpečným chemikáliím a velice vysokou odolnost vůči memetickým a mentálním hazardům.

[SCP-860]
image path = 860.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-860 je obyčejně vypadající tmavě modrý klíč.
text2 = Při náhodných časových intervalech se na jeho čepeli objevilo několik čísel. Bylo zjištěno, že se jedná o souřadnice zemské šířky a výšky.
text3 = SCP-860 je schopno odemknout všechny dveře vyskytující se na oněch místech.
text4 = Po vstupu do dveří odemčených tímto objektem se subjekt nedostane na druhou stranu místnosti, nýbrž do neznámé, lesovité krajiny, označené jako SCP-860-1.

[SCP-895]
image path = 895.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-895 je dubová rakev nalezena v márnici [REDIGOVÁNO].
text2 = SCP-895 způsobuje interferenci na videozáznamech spolu s halucinacemi do přibližně padesátimetrové vzdálenosti. Tyto vizuální jevy jsou většinou označovány jako znepokojivé či dokonce traumatizující.
text3 = Všechny videozáznamy tohoto objektu natočeny ze vzdálenosti 5 či méně metrů způsobují vážné trauma a psychické potíže.

[SCP-914]
image path = 914.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-914 je obrovský stroj vážící několik tun a zabírající plochu 18 metrů čtverečních. Je tvořeno šrouby, řemeny, kladkami, pružinami a dalšími podobnými součástkami.
text2 = Po vložení předmětu do komory označené jako "Vstup" a otočení klíče "rafinuje" SCP-914 daný předmět. Při tomto jevu není ztracena žádná energie. Kvalitu rafinováni lze nastavit na předním panelu, kde je také umístěn klíč.
text3 = Je přísně zakázáno vkládat jakoukoli organickou hmotu dovnitř vstupní komory SCP-914.

[SCP-939]
image path = 939.jpg
align x = left
align y = top
disablebackground = true
text1 = SCP-939 jsou endotermní, smečkoví predátoři vykazující atrofii několika smyslů, podobně jako někteří troglobionti. SCP-939 jsou průměrně 2.2 metrů vysoké a průměrně váží 250 kg - váha se většinou u jednotlivých exemplářů liší, výška nikoli.
text2 = Jejich hlavní metodou lákání kořisti je napodobování lidské řeči. Napodobování zvuků ostatních živočichů bylo v minulosti také zaznamenáno.
text3 = Kořist je většinou usmrcena rychle, a to sice kousnutím do lebky, či krku. Síla jejich kousnutí byla naměřena do výše 35 MPa.


[SCP-966]
image path = 966.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-966 lze spatřit jen na vlnových délkách 700 nm do přibližně 900 nm.
text2 = Jejich hlavní metodou lovu je vyslání nám dříve neznámé vlny. Po střetnutí člověka s touto vlnou ho začne napadat ve spánkových fázích NREM a REM a zbaví ho schopnosti mikrospánku.
text3 = Poté, co deprivují svou kořist spánku vyčkají, než padne do bezvědomí či kompletně zemře únavou. Poté jej, je-li třeba, usmrtí a zkonzumuji.


[SCP-970]
image path = 970.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-970 je prostorová anomálie, ve které se určitá místnost neustále opakuje. Ve všech zaznamenaných případech takovým způsobem, aby bylo možno chodit neustále do další skrz postranní dveře.
text2 = Výskyt těchto místností nijak neovlivňuje patro výskytu či okolní místnosti. Doposud není znám puvod či jakékoliv racionální vysvětlení tohoto fenoménu.
text3 = Po prvním objevení fenoménu se jich vyskytlo několik, z toho [REDIGOVÁNO]% v osmisetkilometrové blízkosti Sektoru 19.

[SCP-1025]
image path = 1025.jpg
align x = right
align y = bottom
text1 = SCP-1025 je asi patnáctisetstránková kniha. Na obale je napsáno "Encyklopedie běžných chorob".
text2 = Žádné jiné výtisky či knihy podobného názvu či vydavatele nebyly nalezeny.
text3 = Čtenáři prožívají příznaky nemocí, o kterých si přečetli. Tyto příznaky se začnou jevit od __ do __ hodin po přečtení.

[SCP-1123]
image path = 1123.jpg
align x = center
align y = center
disablebackground = true 
text1 = SCP-1123 je lidská lebka s chybějící čelistí a zuby. Na čele je lidskou krví napsána moderní khmerštinou věta "Vzpomeň si."
text2 = Genetickými testy jsme zjistili, že lebka i krev patří stejné osobě. Krví psané slovo je špatně čitelné, téměř nečitelné ze vzdálenosti větší, než pěti metrů.
text3 = Subjekty vzdáleny méně než metr od lebky hlásili, že krev vypadá stále čersvtvě, či "vlhce", společně s různými dalšími vizuálními a psychickými anomáliemi.

[SCP-1162]
image path = 1162.jpg
align x = center
align y = center
disablebackground = true 
text1 = SCP-1162 je díra ve zdi, nachazejici se momentálně v Areálu-[REDIGOVÁNO].
text2 = SCP-1162 je aktivováno, když vloží bytost s vědomím dovnitř ruku či jinou končetinu. Po vložení předmětu se daný předmět vytratí a subjekt obdrží předmět jiný. Oba předměty musí být takové velikosti, aby se vešly dovnitř i ven.
text3 = Předměty vytažené ven jsou údajně předměty, které subjekty někdy v životě již viděly, či hledaly.

[SCP-1499]
image path = 1499.jpg
align x = right
align y = bottom
disablebackground = true 
text1 = SCP-1499 je sovětská plynová maska typu GP-5. Testy bylo prokázáno, že svou původní funkci stále plní.
text2 = Anomálie se začnou projevovat po nasazení SCP-1499 na hlavu subjektu, který po cca 1 vteřině zmizí z dohledu a stane se zcela nedetekovatelným.
text3 = Bylo ohlášeno, že subjekty po nasazení vidí krajinu zcela odlišnou té, jenž viděl před nasazením.

[Chaosova vzpoura]
image path = chaos.jpg
align x = left
align y = bottom
disablebackground = true
text1 = Chaosová vzpoura je organizace, která se odtrhla od Nadace po té, co se zmocnila několika závažných objektů SCP v roce 1924.
text2 = Sídlo Vzpoury je doposud, stejně jako její vedení neznámé. Staví se proti Nadaci a několikrát se s ní již střetla.
text3 = Personál Nadace SCP je povinen hlásit a všímat si jakékoliv podezřelé činnosti, která by mohla být spojena se Vzpourou. Je také připravován na případ teroristického útoku.

[Personal tridy D]
image path = classd.jpg
align x = right
align y = bottom
text1 = Personál třídy D jsou pracovníci provádějící testy na objektech třídy Keter.
text2 = Personál třídy D je rekrutován z vězňů odsouzených k trestu smrti. Přestože jsou preferovány odsouzené osoby, uplatněni Protokolu 12 umožňuje použití zločinců méně závažně provinilých, spolu s nasazením civilního obyvatelstva.
text3 = Všechen personál třídy D je prvního dne měsíce zlikvidován a ihned nahrazen. Jejich název je proto odvozen ze slova Disposable - nahraditelní.

[CWM]
image path = cwm.jpg
align x = right
align y = bottom

[Nadace SCP]
image path = foundationlogo.jpg
align x = left
align y = top
text1 = Nadace SCP je organizace věnující se zadržení zvláštních objektů, anomálií a živočichů.
text2 = "SCP" je zkratka "Special Containment Procedures" (Zvláštní Zadržovací Procedury) a také oficiálního hesla Nadace - "Secure, Contain, Protect." (Zabezpečit, Zadržet, Chránit).
