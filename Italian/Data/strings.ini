[Option Tooltip]
; Graphics
vsync = La "Vertical Synchronization" attende che il display completi il ​​ciclo di aggiornamento corrente prima di calcolare il fotogramma successivo, prevenendo problemi come lo screen tearing. Questa funzione lega il frame rate del gioco alla frequenza di aggiornamento del display e potrebbe causare un po' di input lag.
antialias = L'"Anti-Aliasing" viene utilizzato per uniformare l'immagine renderizzata prima della visualizzazione, in modo da ridurre l'aliasing attorno ai bordi dei modelli.
gamma = La "correzione gamma" viene utilizzata per ottenere un buon fattore di luminosità per bilanciare la gamma del display se il gioco appare troppo scuro o troppo luminoso. Un'impostazione troppo alta o troppo bassa può rendere la grafica meno dettagliata.
texlod = "Texture LOD Bias" influenza la distanza alla quale i dettagli delle texture cambiano per prevenire l'aliasing. Modifica questa opzione se le texture sfarfallano o appaiono troppo sfocate.
vram = Le texture memorizzate nella Video-RAM verranno caricate più velocemente, ma ciò avrà anche effetti negativi sulla qualità della texture.
hudoffset = "HUD Offset" regola la posizione degli elementi dell'interfaccia utente sullo schermo, spostando gli elementi HUD più vicino al centro o lontano dai bordi, per migliorare la visibilità sui monitor ultrawide.
fov = Il "Field Of View" (FOV) è la quantità di visuale di gioco visualizzata durante il gioco.

; Audio
musicvol = Regola il volume della musica di sottofondo. Spostare la barra completamente a sinistra disattiverà tutta la musica.
soundvol = Regola il volume degli effetti sonori. Spostare la barra completamente a sinistra disattiverà tutti i suoni.
sfxautorelease = "Sound auto release" libera un suono dalla memoria se non viene utilizzato dopo 5 secondi. Previene problemi di allocazione della memoria.
usertrack = Attiva/disattiva la possibilità di riprodurre tracce personalizzate sul canale 1 della radio. Queste tracce vengono caricate dalla directory "SFX\Radio\UserTracks\". Premere "1" quando la radio è selezionata per cambiare traccia sonora.
usertrackmode = Imposta la modalità di riproduzione per le tracce personalizzate. "Ripeti" riproduce tutti i file in ordine alfabetico. "Casuale" sceglie la traccia successiva in modo casuale.
usertrackmode.note = Si noti che la modalità casuale non impedisce la ripetizione delle tracce riprodotte in precedenza.
usertrackscan = Ricontrolla la directory delle tracce sonore personalizzate per eventuali file audio nuovi o rimossi.

; Controls
mousesensitivty = Regola la velocità del mouse.
mousesmoothing = Regola la fluidita del mouse.
binds = Configura i controlli del gioco a tuo piacimento.

; Advanced
showhud = Mostra la barra della stamina e del battimento degli occhi.
console = Disattiva/attiva l’uso della console di gioco. Può essere usata in game cliccando {0}.
console.note = Usare la console disattiverà gli achievement Steam
speedrunmode = Visualizza un timer e modifica il modo in cui viene monitorato il tempo di gioco per conformarlo ai requisiti delle speed run
numericseeds = Consente di inserire i seed come numeri interi, che verranno utilizzati per inizializzare direttamente il generatore di numeri casuali interno al gioco. Quando non viene inserito alcun seed, vengono utilizzati i millisecondi trascorsi dall'avvio del computer.
achpopup = Mostra la notifica Pop-Up quando un’achievement viene sbloccato
launcher = Permette di Ri-attivare il launcher se è stato disattivato.
showfps = Mostra la quantità dei frame al secondo.
framelimit = Limita il framerate del gioco.
framelimit.note = Di solito, si preferisce un frame rate di 60 FPS o superiore. Se noti un eccessivo stuttering con questa impostazione, prova ad abbassarla per rendere il frame rate più consistente

