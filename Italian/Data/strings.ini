[Death Message]
008 = Il soggetto D-9341 mentre consumava il Dr. [REDACTED] al settore [REDACTED]. Il soggetto è stato immediatamente terminato da delle unità di epsilon-11 e il corpo è stato mandato per effetuare un autopsia. Infezione da parte di SCP-008 è stata confermata, dopo di che, il corpo è stato incenerito.
008.gate = Il soggetto D-9341 è stato trovato mentre si aggirava in  {0}. Il soggetto è stato immediatamente terminato da delle unità di Epsilon-11 e il corpo è stato mandato per effetuare un autopsia. un infezione da parte di SCP-008 è stata confermata, Dopo di che, il corpo è stato incenerito.
008.gate.a = Gate A
008.gate.b = Gate B
008zombie = Soggetto D-9341. Causa di morte: diverse lacerazioni su tutto il corpo e lividi gravi Causati da [DATA EXPUNGED], che era infettato con SCP-008. (REDATTO) è stato poi terminato da Epsilon-11
012 = Soggetto D-9341 è stato trovato in una ponzanghera di sangue vicino a SCP-012. Il soggetto sembra essersi aperto i polsi per scrivere su SCP-012, ha scritto tre linee aggiuntive alla composizione prima di muorire dissanguato.
035.chamber = Soggetto D-9341 Trovato deceduto dentro la cella di SCP-035. Il soggetto presenta una forte emorragia dei vasi sanguigni intorno agli occhi e all'interno della bocca e del naso. il corpo è stato mandato per fare un autopsia.
035.tentacle = "Per occuparci di questo, non basterà la solita squadra di pulizia. Sembra che all'interno della camera si siano formate due grandi appendici tentacolari molto attive. Il loro livello di aggressività è diverso da qualsiasi cosa avessimo mai visto prima: sembra che abbiano picchiato a morte qualche sfortunato Classe D durante la violazione di contenimento."
035.tentacle.office = "Un'appendice tentacolare, grande e molto attiva, sembra essere cresciuta all'esterno del cadavere di uno scienziato nell'area dell'ufficio [REDATTO]. Il suo livello di aggressività è diverso da qualsiasi cosa avessimo mai visto prima: sembra che abbia picchiato a morte qualche sfortunato Classe D durante la violazione."
049 = Instanza attiva di SCP-049-2 Scoperta in [REDACTED]. Terminato dai i Nine-Tailed Fox.
049.chamber = Tre (3) instanze attive di SCP-049-2 scoperte nel tunnel fuori dalla cella di contenimento di SCP-049. terminati dai i nine tailed fox.
0492 = Soggetto D-9341. Causa di morte: diverse lacerazioni su tutto il corpo e lividi gravi causati da un instanza di SCP-049-2.
096 = Una grande pozzanghere di sangue scoperta in [DATA REDACTED]. Il DNA è stato confermato essere di D-9341. Molto probabilmente è stato [DATA REDACTED] da SCP-096.
106.pd = Soggetto D-9341. Corpo parzialmente decomposto da quello che sembra l’effetto di corrosione di SCP-106. Il corpo è stato incenerito.
106.pd.crushed = Oltre all'aspetto decomposto tipico delle vittime di SCP-106, il corpo presenta ferite mai osservate prima: una frattura massiccia del cranio, tre costole rotte, una spalla fratturata e molteplici lacerazioni gravi.
106.pd.fall = Oltre all'aspetto decomposto tipico delle vittime di SCP-106, il soggetto sembra aver subito fratture multiple e gravi ad entrambe le gambe.
173 = Soggetto D-9341. causa di morte: Frattura cervicale fatale. Si presume sia stato attaccato da SCP-173.
173.camera = Le registrazioni di sicurezza Confermano che il soggetto sia stato ucciso da SCP-173.
173.intro = Soggetto D-9341. Causa di morte: Frattura cervicale fatale. Secondo il capo della sicurezza Franklin Che era presente al container di 173 durante la breccia, il soggetto è stato ucciso da 173 non appena problemi alle luci si sono presentati.
173.doors = "Se non sbaglio, uno degli scopi principali di queste stanze era impedire a SCP-173 di muoversi ulteriormente in caso di violazione del contenimento. Quindi, chi ha avuto la brillante idea di mettere un CONDOTTO DI VENTILAZIONE delle dimensioni di una persona lì dentro?"
205 = Il ciclo di SCP-205 sembra aver ripreso il suo corso normale dopo le anomalie osservate durante [REDATTO]. Il corpo del soggetto D-9341 è stato scoperto all'interno della camera. Il soggetto mostra segni di trauma da corpo contundente tipici del personale che entra nella camera a luci spente.
420js = Soggetto D-9341 trovato in uno stato di coma in [DATA REDACTED]. Il soggetto teneva tra le mani, quello che sembrava una sigaretta mentre sorrideva. L'analisi chimica della sigaretta non ha dato risultati conclusivi, sebbene sembri contenere un'elevata concentrazione di una sostanza chimica non identificata, la cui struttura molecolare è sorprendentemente simile a quella del tetraidrocannabinolo.
427 = "Richiedo supporto dalla MTF Nu-7. abbiamo bisogno di più potenza per uccidere questa cosa."
895 = "Quello che so è che è morto di arresto cardiaco. se propio devo tirare a indovinare credo sia stato ucciso da SCP-895, ma non è mai stato osservato fare effetto su equipaggiamento da così lontano. dovremmo fare dei test per vedere se il raggio di azione di 895 stia aumentando"
895.nvg = "un Classe D ha osservato SCP-895 attraverso un visore notturno, uccidendolo."
895.finenvg = "un Classe D ha osservato SCP-895 attraverso un paio di occhiali per la visione notturna digitale, presumibilmente potenziati da SCP-914. È possibile che il soggetto sia stato in grado di resistere parzialmente agli effetti memetici attraverso questi occhiali. Gli occhiali sono stati conservati per ulteriori studi."
914.rough = "Un cadavere gravemente mutilato è stato trovato all'interno della cabina di uscita di SCP-914. Il test del DNA ha identificato il soggetto, D-9341 il soggetto è stato raffinato da 914 sulla opzione "rozza", siamo ancora confusi some come sia finito dentro la cabina di intake e chi o cosa abbiamo girato la chiave".
914.superman = Una tuta di Classe D trovata in [DATI REDATTI]. Dopo ulteriori esami, la tuta è stata trovata piena di 12,5 chilogrammi di una sostanza blu simile alla cenere. L'analisi chimica della sostanza non è ancora conclusiva. Molto probabilmente correlata a SCP-914.
939 = "tutte le quattro (4) instanze di SCP-939 che erano scappate sono state catturate e ricontenute con successo. Tre (3) di loro hanno fatto un bordello al magazzino 6. un team di pulizia è stato assegnato ad occuparsene"
1025.cardiacarrest = "È morto di arresto cardiaco dopo aver letto SCP-1025, questo è certo. Esiste un arresto cardiaco psicosomatico o SCP-1025 ha delle proprietà anomale di cui non siamo ancora a conoscenza?"
1123 = Il soggetto D-9341 è stato ucciso a colpi d'arma da fuoco dopo aver tentato di attaccare un membro della Nine Tailed Fox. I nastri di sorveglianza mostrano che il soggetto si aggirava per il sito circa 9 minuti prima, gridando la frase "sbarazzatevi dei quattro parassiti" in cinese. SCP-1123 è stato trovato in [REDATTO] nelle vicinanze, il che suggerisce che il soggetto sia entrato in contatto fisico con esso. Come esattamente SCP-1123 sia stato rimosso dalla sua camera di contenimento è ancora sconosciuto.
1048a = Un cadavere di un classe D coperto di orecchie è stato trovato a (REDATTO). molto probabilmente è stato attaccato da un instanza di SCP-1048-A.
1162 = Un soggetto di Classe D morto è stato scoperto all'interno della camera di contenimento di SCP-1162. Un'autopsia ha rivelato che il suo polmone destro era mancante, il che suggerisce un'interazione con SCP-1162.
1499 = La posizione di SCP-1499 è ancora sconosciuta, ma una squadra di ricognizione è stata inviata per indagare sulle segnalazioni di un violento attacco a una chiesa nella città russa di [REDATTO].
14991 = Un uomo non identificato e un soggetto di Classe D deceduto sono stati scoperti a [REDATTO] dalla Nine Tailed Fox. L'uomo è stato descritto come molto agitato e sembrava parlare solo russo. È stato portato in un'area di detenzione temporanea a [REDATTO] in attesa dell'arrivo di un traduttore.
14991.dimension = A tutto il personale presente nel rifugio di evacuazione LC-2 durante la violazione sono stati somministrati amnestici di Classe B a causa dell'incidente 1499-E. Il soggetto di Classe D coinvolto nell'evento è morto poco dopo essere stato colpito dall'agente [REDATTO].
guard.intro = Soggetto D-9341. Causa di morte: ferita da arma da fuoco alla testa. le registrazioni di sicurezza confermano che sia stato ucciso dall’agente ulgrin poco dopo il lock down del sito.
guard.gate.b = "Agente G che parla. ho eliminato un classe D che provava a scappare al Gate B."
apache = "CH-2 che parla. Ucciso un classe D che provava a scappare a {0}."
apache.gate.a = Gate A
apache.gate.b = Gate B
ntf = Subject D-9341. Terminato dai Nine-Tailed Fox
ntf.bloodloss = Soggetto D-9341. Morto dissanguato dopo essere stato sparato da dei nine tailed fox.
tesla = Soggetto D-9341. ucciso dal tesla gate a [REDATTO].
killbat = Il soggetto D-9341 è stato trovato morto all'interno della cabina di uscita di SCP-914, accanto a quella che sembra essere una normale batteria da nove volt. Il soggetto è coperto di gravi ustioni elettriche e si presume sia morto a causa di una scossa elettrica causata dalla batteria. La batteria è stata conservata per ulteriori studi.
suicide_1 = [REDATTO]
suicide_2 = Soggetto D-9341 trovato morto al settore [REDATTO]. Il soggetto non sembra aver subito danno fisico, e non si riesce a capire cosa l’abbia ucciso, il corpo è stato conservato per formulare un autopsia.
suicide_3 = ???
suicide_4 = Soggetto D-9341 trovato deceduto nel settore [REDATTO]. il soggetto sembra aver scritto le lettere "Kys" con il suo sangue accanto a lui. non ci sono segni di traumi, lacerazioni o cose varie
gassed = Soggetto D-9341 trovarto morto in [DATI REDATTI]. Causa di morte: soffocazione per via del gas di decontaminazione.

