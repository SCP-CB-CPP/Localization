[Mobile Task Forces]
image path = mtf.jpg
align x = center
align y = center
text1 = Le MTF sono piccole squadre (solitamente da dieci a venti agenti, anche se non sono rari i gruppi con più di 50 agenti) specializzati in ruoli specifici o che rispondono a situazioni specifiche.
text2 = La Mobile Task Force E-11 ("Nine Tailed Fox") è un unità d’elite che si occupa di situazioni di classe (REDATTO), rappresentano il meglio del meglio della fondazione.
text3 = il loro compito è occuparti delle violazioni di contenimento, ricontenendo tutte i soggetti scp liberi, salvare il personale delle fondazioni, e uccidere ogni Classe D ribelle.

[Night Vision Goggles]
image path = NVG.jpg
align x = right
align y = top
disablebackground = true
text1 = In caso di blackout elettrico, le unità MTF vengono dotate di visori notturni di serie.
text2 = vengono dati anche agli scienziati ma di soltio soltanto durante i black out o altri casi eccezionali.

[SCP-012]
image path = 012.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-012 è stato recuperato dall'archeologo K.M. Sandoval durante lo scavo di una tomba in Italia settentrionale. L'oggetto, un pezzo di spartito scritto a mano intitolato "Sul monte Golgota", parte di un insieme di spartiti più ampio, sembra essere incompleto.
text2 = In primo luogo si pensava che l'inchiostro rosso/nero provenisse da qualche forma di bacca o che fosse un inchiostro naturale, ma è stato in seguito scoperto essere sangue umano proveniente da diversi soggetti.
text3 = diversi soggetti dei test hanno potuto accedere allo spartito: in ogni iterazione, i soggetti stessi si mutilavano al fine di utilizzare il proprio sangue per finire il pezzo.

[SCP-035]
image path = 035.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-035 sembra essere una maschera teatrale di porcellana bianca sebbene, alle volte, cambi espressione
text2 = Quando SCP-035 è posto sul volto di un individuo, uno schema di onde cerebrali alternate prodotte da SCP-035 si sovrappone a quello del sistema originale, facendolo fuori effettivamente e causando la morte cerebrale dell'individuo, il quale poi afferma di essere la coscienza contenuta in SCP-035.
text3 = le analisi psicologiche hanno scoperto in SCP-035 una natura altamente manipolativa, capace di forzare cambiamenti improvvisi e radicali nello stato psicologico del suo interlocutore. SCP-035 ha mostrato di essere estremamente sadico, spingendo alcuni a commettere suicidio.

[SCP-049]
image path = 049.jpg
align x = left
align y = center
disablebackground = true
text1 = SCP-049 ha un aspetto umanoide; tuttavia, la Fondazione non è attualmente in grado di studiarne il volto e il corpo in modo più approfondito, poiché è coperto da quello che sembra essere l'abito del tradizionale Dottore della Peste dell'Europa del XV-XVI secolo.
text2 = Il tocco di SCP-049 è invariabilmente letale per gli esseri umani. Dopo il contatto con la/le mano/i di SCP-049, la vittima (di seguito denominata SCP-049-2) subisce [DATI CANCELLATI] e muore in pochi istanti.
text3 = SCP-049 quindi estrae una borsa fatta di [DATI CANCELLATI] contenente bisturi, ago, filo e diverse fiale di una sostanza ancora non identificata e inizia a sezionare SCP-049-2, oltre a inserire varie sostanze chimiche nel corpo. 
text4 = Dopo circa 20 minuti, SCP-049 ricucirà SCP-049-2 e tornerà docile. Dopo un periodo di alcuni minuti, SCP-049-2 riprenderà i segni vitali e sembrerà rianimarsi.

[SCP-066]
image path = 066.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-066 è una massa informe di tessuto intrecciato pesante circa un chilo.
text2 = Dopo l'incidente 066-2 (vedere il rapporto sull'incidente 066-2), SCP-066 ha iniziato a mostrare un comportamento altamente incoerente con le sue proprietà precedenti. 
text3 = SCP-066 ora mostra una mobilità significativa e produrrà note ed effetti anomali in presenza di qualsiasi essere umano, indipendentemente dal fatto che quell'essere umano interagisca con SCP-066.

[SCP-079]
image path = 079.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-079 è un microcomputer Exidy Sorcerer costruito nel 1978. 
text2 = Non si sa quando SCP-079 abbia guadagnato l’intelligenza, ma si sa che il software si è evoluto al punto che il suo hardware non dovrebbe essere più in grado di gestirlo, nemmeno lontanamente.
text3 = Ha superato il test di Turing ed è abbastanza colloquiale, anche se molto rude ed odioso di tono. ma ha anche il desiderio di scappare.

[SCP-096]
image path = 096.png
align x = right
align y = bottom
disablebackground = true
text1 = SCP-096 è in genere estremamente docile e i sensori di pressione all'interno della sua cella indicano che trascorre la maggior parte del giorno verso la parete orientale.
text2 = Tuttavia, quando qualcuno vede il viso di SCP-096, sia direttamente, sia tramite la registrazione video, o anche una fotografia, entrerà in una fase di notevole stress emotivo.
text3 = Circa uno o due minuti dopo la prima osservazione, SCP-096 inizierà a correre verso la persona che ha visto la sua faccia.

[SCP-106]
image path = 106.jpg
align x = right
align y = bottom
text1 = SCP-106 si presenta come un umanoide anziano con un aspetto generale di decomposizione avanzata. Questo aspetto può variare, ma la qualità del "marcio" è stata osservata in tutte le forme.
text2 = SCP-106 causa un effetto di "corrosione" su tutta la materia solida che tocca, generando un'avaria fisica nei materiali pochi secondi dopo averli toccati. E' stato osservato arrugginimento, marciume, screpolature di materiale e la creazione di una sostanza nera simile a muco che somiglia al materiale che riveste SCP-106.
text3 = SCP-106 è in grado di passare attraverso la materia solida, e catturerà e ucciderà la sua vittima portandola nella sua "dimensione tascabile"

[SCP-173]
image path = 173.jpg
align x = left
align y = bottom
text1 = SCP-173 è Realizzato in calcestruzzo e cemento armato con tracce di vernice spray marca Krylon. SCP-173 è animato ed estremamente ostile.
text2 = SCP-173 non può muoversi mentre è sotto contatto visivo diretto. Il contatto visivo con SCP-173 non deve essere interrotto in nessun momento. Al personale selezionato per entrare nel container è ordinato di avvertirsi a vicenda prima di battere le palpebre.

[SCP-205]
image path = 205.jpg
align x = right
align y = bottom
disablebackground = true
text1 = SCP-205 è un paio di lampade di inondazione usate in fotografia. La luce emessa da ogni lampada si comporta in una maniera unica e attraversa completamente qualsiasi superficie che non sia di colore bianco.
text2 = Se la luce continua ininterrottamente a passare attraverso qualsiasi cosa, non gettando nessuna ombra, ogni lampada mostrerà l'ombra di una giovane donna non identificata su qualsiasi superficie piatta bianca, come lo schermo da proiezione della Camera 52.

[SCP-294]
image path = 294.jpg
align x = center
align y = bottom
disablebackground = true
text1 =  L'elemento SCP-294 ha le sembianze di un normale apparecchio per la distribuzione di bevande calde, e si differenzia da tale solo per la presenza di uno schermo touch con dei bottoni che mostrano una tastiera QWERTY standard.
text2 = All'utente viene offerto di inserire il nome di qualsiasi liquido tramite la tastiera sullo schermo, dopo aver inserito 50 centesimi di dollaro americano; una volta inserito il nome del liquido, la macchina produce un bicchiere di carta standard, poi riempito del liquido richiesto.
text3 = novantasette test iniziali (i cui input sono variati da liquidi come acqua, caffè, birra, bevande gasate, liquidi non edibili come acido sulfurico, detergente, olio da motore, e sostanze che non esistono solitamente nello stato liquido come azoto, ferro e vetro), tutti sono stati portati a termine con successo.

[SCP-372]
image path = 372.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-372 è una creatura di genere sconosciuto, lungo circa 2 metri dalla testa alla coda e pesante circa 45 chilogrammi. Ha un corpo lungo e sottile con otto paia di arti sottili.
text2 = SCP-372 ha imparato, utilizzando questi impulsi, a predire i movimenti di ogni essere intorno a lui. Utilizza questa tecnica per nascondersi: dietro la testa di una persona in cerca di esso, nascondendosi nei loro scotomi (punti ciechi) e saccadi.
text3 = nel caso di una violazione del contenimento, tutto il personale deve segnalare movimenti brevi e veloci dietro la loro testa.

[SCP-427]
image path = 427.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-427 è un piccolo, sferico e ben decorato medaglione cavo, fatto di argento lucidato. Le incisioni ornamentali non sembrano servire ad alcuna funzione.
text2 = SCP-427 è stato creato dopo aver collocato una pillola di SCP-500 nella cabina "Input" di SCP-914, usando l'impostazione "Raffinato". Sembra mostrare nessuna attività insolita quando chiuso. Quando SCP-427 è aperto ed esposto a tessuto biologico, rigenera rapidamente il danno cellulare, e in qualche modo è in grado di sterilizzarlo da infezioni, contaminazioni o corpi estranei.
text3 = Comunque un'esposizione a lungo termine provoca un notevole rischio per la salute. Mentre il medaglione cura il danno, ottimizza il sistema immunitario del soggetto. Resistenza alle malattie e alle tossine è aumentata del 500% comparata ad un accurato LD50 o tasso di mortalità, dopo appena un totale di 10 minuti di esposizione, e 1000% dopo 15 minuti. Superati i 15 minuti di esposizione, il sistema muscolatorio inizierà ad ottimizzarsi, aumentando la forza e la soglia del dolore del 200-300%. Tutti gli altri sistemi continueranno ad ottimizzarsi. Il personale di Classe-D esposto all'oggetto per oltre un'ora inizia a mutare in una massa informe di tessuti. Il tempo di conversione accelera con l'esposizione continuativa a SCP-427.

[SCP-500]
image path = 500.jpg
align x = right
align y = bottom
text1 = SCP-500 è un piccolo contenitore di plastica che, al momento della stesura di questo documento, contiene quarantasette (47)
text2 = Una pillola, se assunta per via orale, cura con efficacia qualunque malattia di cui sia affetto il soggetto nell'arco di due ore, il tempo esatto varia a seconda della gravità e dal numero di malattie del soggetto.
text3 = Nonostante test approfonditi, tutti i tentativi di sintetizzare ciò che si ritiene essere il principio attivo di SCP-500 non hanno avuto esito positivo.

[SCP-513]
image path = 513.jpg
align x = center
align y = center
disablebackground = true
text1 = Fisicamente, SCP-513 è un normale campanaccio arrugginito. Nessun segno o incisione è visibile sulla superficie a causa del grande livello di corrosione.
text2 = Circa un'ora dopo l'esposizione a qualsiasi rumore prodotto da SCP-513, le vittime dell'esposizione iniziano a intravedere un'entità denominata SCP-513-1.
text3 = Tutti gli interrogatori finora condotti indicano che SCP-513-1 è un umanoide alto ed emaciato, con mani insolitamente grandi.
[SCP-682]
image path = 682.jpg
align x = right
align y = bottom
text1 = SCP-682 è una grande creatura vagamente simile a un rettile di origine sconosciuta. Sembra nutrire un odio per ogni forma di vita, espresso in diverse interviste.
text2 = E' stato osservato che SCP-682 possiede forza, velocità e riflessi estremamente alti, nonstante l'esatto livello vari a seconda della sua forma.Le capacità rigenerative e la resistenza di SCP-682 sono sconcertanti: SCP-682 è stato osservato muoversi e parlare con l'87% del corpo distrutto o decomposto.
text3 = SCP-682 deve essere terminato il prima possibile.

[SCP-714]
image path = 714.jpg
align x = center
align y = center
disablebackground = true
text1 = Apparentemente nient'altro che un anello di giada verde, SCP-714 ha dimostrato di potersi espandere e contrarre per adattarsi perfettamente al dito di chiunque lo tocchi, anche se questa è la meno importante delle sue proprietà. 
text2 = Nel giro di pochi minuti dopo aver infilato al dito SCP-714, chi lo indossa riferisce di sentirsi esausto, sia fisicamente che mentalmente. Per questo motivo, si sentiranno spinti a "sedersi e riposare un po'".
text3 = coloro che indossano SCP-714 hanno dimostrato di avere tolleranza superiore a sostanze chimiche e agenti memetici

[SCP-860]
image path = 860.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-860 è una chiave di colore blu scuro dalla forma comune.
text2 = Ad intervalli di tempo apparentemente casuali delle serie di numeri, rivelatesi poi essere delle coordinate UTM, appaiono sulla lama della chiave.
text3 = SCP-860 si adatta a qualsiasi serratura che richiede una chiave localizzata nell'area delle coordinate
text4 = Quando SCP-860 viene utilizzato per sbloccare e aprire una porta, quest'ultima non condurrà alla sua solita destinazione; essa condurrà invece in una piccola radura, con al centro di un sentiero largo 80 cm, denominata SCP-860-1. 

[SCP-895]
image path = 895.jpg
align x = center
align y = bottom
disablebackground = true
text1 =  SCP-895 è una bara intarsiata di quercia recuperata presso l'Obitorio ███████████ in data ██/██/██.
text2 = SCP-895 è in grado di creare strani distorsioni alle telecamere di sorveglianza per un raggio di 50 metri, simili a macabre allucinazioni con durata variabile e regolarità corrispondente alla vicinanza della telecamera. Nel raggio di 5 metri di distanza da SCP-895. 
text3 = i filmati registrati possono causare gravi traumi psicologici ed isteria nella maggioranza dei soggetti.

[SCP-914]
image path = 914.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-914 è un grande dispositivo a orologeria dalla massa di diverse tonnellate, esteso su una superficie di diciotto metri quadrati. Esso è costituito da viti a ricircolo, cinghie, pulegge, ingranaggi, molle ed altri dispositivi di orologeria.
text2 = Quando un oggetto viene inserito nella cabina "Input", una porta a scorrimento si chiuderà e suonerà una piccola campana. Se la manopola è posizionata su una qualsiasi delle parole, SCP-914 "rifinirà" l'oggetto nella cabina. Il processo non necessita di alcuna energia, e l'oggetto sembra essere sottoposto a una forma di stasi fino a che la porta della cabina ''Output'' non sarà aperta.
text3 = Allo stato attuale, nessun test su materiali biologico è permesso, in riferimento al documento 109-B:117.

[SCP-939]
image path = 939.jpg
align x = left
align y = top
disablebackground = true
text1 = SCP-939 sono predatori endotermici che vivono in branco e che mostrano atrofia di vari sistemi similarmente agli organismi troglobi. SCP-939, in media, sono lunghi 2,2 metri e pesano 250 kg, sebbene il peso sia altamente variabile.
text2 = Il metodo di caccia principale di SCP-939 è l'imitazione della voce umana utilizzando quella delle sue vittime precedenti; nonostante questo, sono state documentate imitazioni di versi di altre specie animali e cacce attive notturne
text3 = La preda viene solitamente uccisa con un singolo morso al cranio o al collo; la pressione del morso eccede i 35 MPa


[SCP-966]
image path = 966.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-996 è visibile solamente nelle lunghezze d'onda che vanno dai 700 nm ai circa 900 nm; questo vale per tutti i tessuti di SCP-966.
text2 =  I loro metodi di caccia consistono in una singola emissione di un tipo di onde precedentemente sconosciute (denominate onde ██████, in onore del defunto Dottor ██████), le quali inibiscono permanentemente la capacità delle creature colpite di entrare nelle fasi NREM e REM del sonno; anche il micro-sonno viene inibito.
text3 = Dopo aver privato la sua vittime del sonno, SCP-966 pedinerà la propria preda fino a quando la mancanza di riposo le renderà inerme, momento al quale SCP-966 procederà a consumarla.


[SCP-970]
image path = 970.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-970 è un fenomeno spaziale in cui un insieme di stanze si ritrovano collegate ad anello tra di loro. In tutti i casi riscontrati ciò avviene mediante una serie di porte che compaiono nelle pareti, tutte in linea retta, in modo tale che sia possibile camminare in avanti e ritrovarsi nella posizione di partenza.
text2 = l’alterazione delle stanze non ha effetto su le stanze che si trovano nelle vicinanze
text3 = sono stati scoperti ██ ulteriori esempi del fenomeno, di cui il ██% in un raggio di 800 chilometri dal Settore 19. Un esempio notevole è stato trovato all'interno dell'ala occidentale di un palazzo legislativo.

[SCP-1025]
image path = 1025.jpg
align x = right
align y = bottom
text1 = SCP-1025 è un libro con rilegatura rigida, lungo approssimativamente 1500 pagine. La copertina e il dorso presentano il titolo “L’Enciclopedia delle Malattie Comuni”.
text2 = Non è stata trovata alcuna altra copia di un libro con quel titolo e quell’editore, e di quest'ultimo non esiste nessuna traccia.
text3 = Coloro che leggono il libro sembrano manifestare i sintomi di qualsiasi malattia che leggano. L’effetto può impiegare da █ a ██ ore per comparire.

[SCP-1123]
image path = 1123.jpg
align x = center
align y = center
disablebackground = true 
text1 = SCP-1123 è un teschio umano mancante della mandibola e di tutti i denti. Sulla superficie della squama frontalis esteriore vi è un iscrizione in Khmer moderno tracciata con sangue umano, che recita "Ricorda".
text2 = sia il teschio che il sangue sono stati datati in modo certo al 197█ e i test genetici confermano che entrambi provengono dallo stesso individuo. La scritta in Khmer è estremamente sbiadita e invisibile alla maggior parte dei soggetti stanti ad oltre 5 metri di distanza.
text3 = quando un soggetto tenterà di avvicinarsi a SCP-1123, egli riferirà che l'iscrizione stia diventando progressivamente più visibile finché, a meno di un metro di distanza, egli riferirà che la scritta sembri essere appena stata tracciata. Alcuni soggetti affermano che a questa distanza la scritta appaia "ancora bagnata"; questo effetto non è riproducibile tramite attrezzature ottiche.

[SCP-1162]
image path = 1162.jpg
align x = center
align y = center
disablebackground = true 
text1 = SCP-1162 è un blocco di cemento con un buco contenuto al sito Site-[DATA REDACTED].
text2 = SCP-1162 si attiva quando un essere con facoltà mentali funzionanti mette la mano dentro il buco a tal punto i soggetti affermano di toccare una superficie simile a SCP-1162, e poi trovano un oggetto piccolo abbastanza da passare attraverso il buco
text3 = questi oggetti sono stati riconosciuti come oggetti che il soggetto aveva perso.

[SCP-1499]
image path = 1499.jpg
align x = right
align y = bottom
disablebackground = true 
text1 = SCP-1499 è una maschera antigas GP-5 di fabbricazione sovietica. Un test effettuato sul sigillo della maschera suggerisce che l'oggetto conservi ancora la sua funzionalità originale.
text2 = Gli effetti anomali di SCP-1499 si attivano quando una persona posiziona SCP-1499 sul capo. Circa un secondo dopo che SCP-1499 viene fissato in modo sicuro sulla testa del soggetto, egli scomparirà e non sarà più rilevabile.
text3 = Una volta indossato SCP-1499, i soggetti riferiscono di trovarsi in un ambiente completamente diverso da quello in cui si trovavano prima di indossare SCP-1499.

[The Chaos Insurgency]
image path = chaos.jpg
align x = left
align y = bottom
disablebackground = true
text1 =  L'Insorgenza del Caos è un gruppo separatista della Fondazione, creato da una parte della SSM Alfa-1 che disertò assieme a diverse anomalie nel 1924.
text2 = La base principale delle operazioni dell'Insorgenza è sconosciuta, così come i suoi capi attuali. Questa organizzazione è una diretta antagonista della Fondazione, fino all'utilizzo della forza letale per interrompere o prevenire il contenimento di molteplici anomalie. 
text3 = Il personale deve essere messo in guardia contro possibili attacchi, azioni terroristiche e spie dell'Insorgenza ed è obbligato a notificare i propri superiori riguardo a qualsiasi comportamento di altri membri del personale che corrisponda al profilo comportamentale dell'Insorgenza.

[Class-D Personnel]
image path = classd.jpg
align x = right
align y = bottom
text1 = Il personale di Classe D è personale sacrificabile utilizzato per trattare con anomalie estremamente pericolose
text2 = Il personale di Classe D viene solitamente prelevato da detenuti condannati per crimini violenti, soprattutto quelli condannati alla pena di morte. In tempi di costrizione, può essere promulgato il Protocollo 12, che autorizza il reclutamento da altre fonti — come prigionieri politici, popolazioni rifugiate ed altre fonti civili.
text3 = Classe D deve essere assegnato a regolari valutazioni psichiatriche e deve essere amministrato con un amnestico di (almeno) Classe B o terminato alla fine del mese a discrezione della staff medico e/o di sicurezza alla fine del mese.

