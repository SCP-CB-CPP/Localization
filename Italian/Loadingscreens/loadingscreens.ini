text1 =  la Fondazione agisce oltre la giurisdizione, autorizzata ed incaricata da ogni governo nazionale maggiore con il compito di contenere oggetti, entità e fenomeni anomali.
text2 = "SCP" sta per "Sicurezza, Contenimento, protezione") - il motto sintetiza i metodi e le intenzioni della fondazione.